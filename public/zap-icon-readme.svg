<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Zap icon</title>
  <desc id="desc">Layered network beacon with bidirectional transfer arrows.</desc>
  <defs>
    <linearGradient id="bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111f4a"/>
      <stop offset="1" stop-color="#080d22"/>
    </linearGradient>
    <linearGradient id="ring" x1="130" y1="90" x2="390" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="layer" x1="170" y1="150" x2="336" y2="346" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c83ff"/>
      <stop offset="1" stop-color="#4549c6"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="108" fill="url(#bg)"/>

  <g opacity="0.28" stroke="#ffffff" stroke-width="1">
    <path d="M128 128h256"/>
    <path d="M128 192h256"/>
    <path d="M128 256h256"/>
    <path d="M128 320h256"/>
    <path d="M128 384h256"/>
  </g>

  <g fill="none" stroke="url(#ring)" stroke-width="14" stroke-linecap="round" filter="url(#glow)">
    <path d="M176 180 Q256 112 336 180"/>
    <path d="M202 214 Q256 168 310 214"/>
  </g>

  <g stroke="#22d3ee" stroke-width="10" stroke-linecap="round" fill="none" filter="url(#glow)">
    <path d="M188 250h132"/>
    <path d="M320 250l-24-22"/>
    <path d="M320 250l-24 22"/>
    <path d="M324 294H192"/>
    <path d="M192 294l24-22"/>
    <path d="M192 294l24 22"/>
  </g>

  <g stroke="url(#layer)" stroke-width="14" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <path d="M256 142l-104 56 104 56 104-56z" fill="#6366f1" fill-opacity="0.18"/>
    <path d="M152 252l104 56 104-56"/>
    <path d="M152 292l104 56 104-56"/>
  </g>

  <circle cx="156" cy="196" r="9" fill="#22d3ee"/>
  <circle cx="356" cy="196" r="9" fill="#22d3ee"/>
</svg>
